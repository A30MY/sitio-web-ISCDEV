<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto Bonito</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .contact-container {
      background-color: #fff;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .info {
      flex: 1;
      padding: 40px;
      background-color: #f5f5f5;
    }

    .info h2 {
      color: #663399;
      margin-bottom: 10px;
    }

    .info p {
      margin: 20px 0;
      color: #555;
    }

    .info .item {
      margin: 10px 0;
      font-size: 16px;
      color: #333;
    }

    .form {
      flex: 1;
      padding: 40px;
      background-color: #ffffff;
    }

    .form h2 {
      color: #663399;
      margin-bottom: 20px;
    }

    .form input,
    .form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .form button {
      background-color: #663399;
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .form button:hover {
      background-color: #552288;
    }

    @media (max-width: 768px) {
      .contact-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <!-- Columna de Información -->
    <div class="info">
      <h2>📞 Contacto</h2>
      <p>¿Tienes alguna duda o comentario? ¡Escríbenos!</p>
      <div class="item">📱 Teléfono: +52 123 456 7890</div>
      <div class="item">✉️ Correo: contacto@ejemplo.com</div>
      <div class="item">📍 Dirección: Ciudad de México, México</div>
    </div>

    <!-- Columna de Formulario -->
    <div class="form">
      <h2>Envíanos un mensaje</h2>
      <form>
        <input type="text" placeholder="Tu nombre" required>
        <input type="email" placeholder="Tu correo" required>
        <textarea rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </div>
  </div>

</body>
</html>
